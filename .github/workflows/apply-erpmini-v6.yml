name: Apply ERPmini v6 patch

on:
  push:
    paths:
      - '.erpmini-upload/V6_READY'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Decode patch
        run: |
          cat .erpmini-upload/v6chunk_* > /tmp/v6.patch.gz.b64
          base64 -d /tmp/v6.patch.gz.b64 | gunzip > /tmp/v6.patch
      - name: Apply patch
        run: git apply --whitespace=fix /tmp/v6.patch
      - name: Clean temporary uploader
        run: rm -rf .erpmini-upload .github/workflows/apply-erpmini-v6.yml
      - name: Commit v6
        run: |
          git config user.name "Atlas ERPmini"
          git config user.email "pabloradamez10@gmail.com"
          git add -A
          git commit -m "Prepara ERPmini v6 para piloto comercial"
          git push
