name: Apply ERPmini v5 patch

on:
  push:
    paths:
      - '.erpmini-upload/READY'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply patch
        shell: bash
        run: |
          base64 -d .erpmini-upload/erpmini-v5.patch.gz.b64 | gunzip > /tmp/erpmini-v5.patch
          patch -p1 < /tmp/erpmini-v5.patch
          rm -rf .erpmini-upload
          rm -f .github/workflows/erpmini-v5-apply.yml

      - name: Commit changes
        shell: bash
        run: |
          git config user.name "ERPmini Atlas"
          git config user.email "pabloradamez10@gmail.com"
          git add -A
          git commit -m "Atualiza Serviços para fluxo guiado v5"
          git push
